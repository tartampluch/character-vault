<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!--
			VIEWPORT META TAG — Phase 19.13 Cross-Device Polish
			=====================================================
			width=device-width, initial-scale=1:
			  Standard responsive viewport. Prevents mobile browsers from rendering
			  the page at a scaled-down desktop width.

			viewport-fit=cover:
			  Tells iOS Safari to render the page edge-to-edge under the device's
			  notch / Dynamic Island / status bar. Without this, content is
			  automatically inset inside the "safe area", leaving ugly black bars.
			  With cover + the env(safe-area-inset-*) padding in app.css, we control
			  exactly which content is inset and which bleeds to the edge (e.g. the
			  campaign banner image can go full-bleed while nav/text is safe-inset).

			  Support: iOS 11+ (iPhone X onwards), Chrome 69+, Firefox 69+.

			minimum-scale=1, maximum-scale=5:
			  Allows user zoom (accessibility requirement — never use maximum-scale=1).
			  iOS will still zoom to 16px-equivalent on focused <input> elements smaller
			  than 16px (handled by the CSS font-size: max(16px, 1em) rule in app.css).
			  WCAG 1.4.4 requires text can be resized to 200% — not preventing zoom upholds this.
		-->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, minimum-scale=1, maximum-scale=5" />

		<!--
			THEME COLOR — Phase 19.13
			=========================
			Controls the browser UI chrome color (status bar, address bar) on:
			  - Android Chrome / Edge (uses this meta tag directly)
			  - iOS Safari / Chrome (uses the media-query variants)
			  - PWA installed apps (title bar tint)

			Two values with media queries:
			  light: oklch(97.3% 0.003 264) ≈ #f5f5f8 — matches --theme-surface-alt in light mode
			  dark:  oklch(13% 0.012 264)   ≈ #1a1b25 — matches --theme-surface in dark mode

			These values match the AppShell top bar / header background so the browser
			chrome blends seamlessly with the app shell (especially at the top on iOS).
		-->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f8" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1a1b25" />

		<!--
			MOBILE WEB APP CAPABILITIES:
			  apple-mobile-web-app-capable: Enables full-screen standalone mode when
			  the app is added to the iOS Home Screen (no address bar shown).
			  apple-mobile-web-app-status-bar-style: "black-translucent" makes the iOS
			  status bar transparent + overlaps app content (requires viewport-fit=cover).
		-->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!--
			FLASH-OF-WRONG-THEME (FOWT) PREVENTION — Phase 19.2
			=======================================================
			This inline <script> runs SYNCHRONOUSLY during HTML parsing, BEFORE the
			browser renders any pixels. It reads the 'theme' cookie and applies the
			'dark' class to <html> immediately if needed.

			WHY SYNCHRONOUS?
			  If we waited for Svelte's ThemeManager to hydrate (which happens after
			  the initial paint), the user would see a brief flash of the wrong theme:
			  e.g. light mode rendered for 50-200ms before the JS kicks in and switches
			  to dark. This is the classic FOWT problem and it is deeply jarring.

			  By running this script synchronously in <head> — BEFORE any CSS is applied
			  or any DOM content is rendered — we ensure the correct class is set from
			  the very first paint.

			WHAT IT DOES:
			  1. Parses the 'theme' cookie from document.cookie (same logic as readThemeCookie
			     in ThemeManager.svelte.ts, but inlined to avoid any module import overhead).
			  2. If 'dark': adds 'dark' class to <html> immediately.
			  3. If 'system': checks prefers-color-scheme and adds 'dark' only if OS is dark.
			  4. If 'light' or no cookie: does nothing (light is the default).

			ALSO UPDATES theme-color META:
			  The meta tags above use prefers-color-scheme, which reflects the OS preference.
			  If the user has manually chosen 'dark' or 'light' in the app (overriding OS),
			  we update the meta tag's content dynamically to match the app's actual theme.
			  This keeps the browser chrome color in sync with the app theme.

			SECURITY NOTE:
			  This script is intentionally minimal — no external dependencies, no async ops.
			  It only reads a cookie and toggles a class. There is no XSS risk as the cookie
			  value is compared against known string literals only; any other value is ignored.

			MAINTENANCE NOTE:
			  If ThemeManager.svelte.ts changes its cookie name (currently 'theme') or its
			  valid values ('system', 'light', 'dark'), this script must be updated to match.
		-->
		<script>
			(function () {
				try {
					// Step 1: Parse the 'theme' cookie value
					var themeCookie = '';
					var cookies = document.cookie.split(';');
					for (var i = 0; i < cookies.length; i++) {
						var parts = cookies[i].trim().split('=');
						if (parts[0] === 'theme') {
							themeCookie = decodeURIComponent(parts[1] || '');
							break;
						}
					}

					// Step 2: Determine whether to apply the 'dark' class
					var shouldBeDark = false;

					if (themeCookie === 'dark') {
						// User explicitly chose dark
						shouldBeDark = true;
					} else if (themeCookie === 'system' || themeCookie === '') {
						// 'system' mode (or no cookie = default to system):
						// Check the OS preference via matchMedia
						shouldBeDark =
							window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					}
					// If 'light': shouldBeDark stays false (no action needed)

					// Step 3: Apply the class synchronously before first paint
					if (shouldBeDark) {
						document.documentElement.classList.add('dark');
						document.documentElement.style.colorScheme = 'dark';
					}

					// Step 4: Update theme-color meta to match actual applied theme
					// This ensures browser chrome (status bar, address bar) matches the app.
					// Only needed when the user's cookie overrides the OS preference.
					var actuallyDark = shouldBeDark;
					var themeMetas = document.querySelectorAll('meta[name="theme-color"]');
					if (themeMetas.length > 0) {
						var targetColor = actuallyDark ? '#1a1b25' : '#f5f5f8';
						// Update all theme-color metas to a single consistent value
						// (replaces the media-query conditional pair with a single winner)
						themeMetas.forEach(function(meta) {
							meta.setAttribute('content', targetColor);
							meta.removeAttribute('media'); // Remove media query since we now know
						});
					}
				} catch (e) {
					// Silently ignore errors (cookie parsing failures, missing matchMedia, etc.)
					// The app will fall back to light mode, which is the safe default.
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
